services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
